name: model-env
channels:
  - conda-forge
dependencies:
  - python=3.10  # Match the environment being used
  - numpy=1.21.2
  - pip=21.2.4
  - scikit-learn=1.0.2
  - scipy=1.7.1
  - pandas>=1.3.0 # Bumped for stability
  - setuptools    # <--- ADD THIS to fix 'pkg_resources' error
  - pip:
    - inference-schema[numpy-support]==1.3.0
    - mlflow==2.8.0
    - mlflow-skinny==2.8.0
    - azureml-mlflow==1.51.0
    - psutil>=5.8,<5.9
    - tqdm>=4.59,<4.60
    - ipykernel~=6.0
    - matplotlib